<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title th:text="'채팅 - ' + ${chatMember.userName} + ' - KPBridge Admin'">채팅 - KPBridge Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

        .navbar { background: #1a1a2e; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .logo { font-size: 18px; font-weight: bold; color: #007bff; text-decoration: none; }
        .nav-links a { color: #ccc; text-decoration: none; margin-left: 16px; font-size: 14px; }

        .chat-wrapper { flex: 1; display: flex; padding: 16px 24px; overflow: hidden; }
        .chat-container { flex: 1; display: flex; flex-direction: column; width: 100%; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }

        .chat-header { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        .back-link { color: #aaa; text-decoration: none; font-size: 20px; margin-right: 4px; }
        .back-link:hover { color: white; }
        .chat-header-info h3 { font-size: 16px; margin: 0; }
        .chat-header-info p { font-size: 12px; color: #aaa; margin: 2px 0 0; }

        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; justify-content: flex-end; }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .msg-row.admin-msg { flex-direction: row-reverse; }
        .msg-row.user-msg { flex-direction: row; }

        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
        .msg-row.user-msg .msg-avatar { background: #e9ecef; color: #555; }
        .msg-row.admin-msg .msg-avatar { background: #007bff; color: white; }

        .msg-bubble { max-width: 90%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-break: break-word; }
        .msg-row.user-msg .msg-bubble { background: #f1f3f5; color: #333; border-bottom-left-radius: 4px; }
        .msg-row.admin-msg .msg-bubble { background: #007bff; color: white; border-bottom-right-radius: 4px; }

        .msg-time { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .msg-row.admin-msg .msg-time { text-align: right; }

        .chat-input-area { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
        .chat-input:focus { border-color: #007bff; }
        .send-btn { background: #007bff; color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 18px; flex-shrink: 0; }
        .send-btn:hover { background: #0056b3; }
        .send-btn:disabled { background: #aaa; }

        @media (max-width: 768px) {
            .chat-wrapper { padding: 0; }
            .chat-container { border-radius: 0; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/admin" class="logo">KPBridge Admin</a>
        <div class="nav-links">
            <a href="/admin/chat">← 채팅 목록</a>
            <a href="/logout">로그아웃</a>
        </div>
    </nav>

    <!-- memberId를 JS에서 사용할 수 있도록 -->
    <input type="hidden" id="memberId" th:value="${chatMember.id}">

    <div class="chat-wrapper">
    <div class="chat-container">
        <div class="chat-header">
            <a href="/admin/chat" class="back-link">‹</a>
            <div>
                <div class="chat-header-info">
                    <h3 th:text="${chatMember.userName} + ' (' + ${chatMember.userId} + ')'"></h3>
                    <p th:text="'가입일: ' + ${#temporals.format(chatMember.joinDate, 'yyyy-MM-dd')}"></p>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <th:block th:each="msg : ${messages}">
                <div th:class="'msg-row ' + (${msg.senderType == 'USER'} ? 'user-msg' : 'admin-msg')">
                    <div class="msg-avatar" th:if="${msg.senderType == 'USER'}"
                         th:text="${#strings.substring(chatMember.userName, 0, 1)}"></div>
                    <div>
                        <div class="msg-bubble" th:text="${msg.content}"></div>
                        <div class="msg-time" th:text="${#temporals.format(msg.sentAt, 'MM-dd HH:mm')}"></div>
                    </div>
                    <div class="msg-avatar" th:if="${msg.senderType == 'ADMIN'}">나</div>
                </div>
            </th:block>
        </div>

        <div class="chat-input-area">
            <input type="text" id="msgInput" class="chat-input" placeholder="답장 입력..."
                   onkeydown="if(event.key==='Enter'){ event.preventDefault(); sendMsg(); }">
            <button class="send-btn" onclick="sendMsg()" id="sendBtn">➤</button>
        </div>
    </div>
    </div>

    <script>
        const memberId = document.getElementById('memberId').value;

        function scrollToBottom() {
            const el = document.getElementById('chatMessages');
            el.scrollTop = el.scrollHeight;
        }
        scrollToBottom();

        function getCsrfHeaders() {
            const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
            const headers = { 'Content-Type': 'application/json' };
            if (token && header) headers[header] = token;
            return headers;
        }

        function appendMessage(content, senderType, sentAt) {
            const container = document.getElementById('chatMessages');
            const isAdmin = senderType === 'ADMIN';
            const row = document.createElement('div');
            row.className = 'msg-row ' + (isAdmin ? 'admin-msg' : 'user-msg');
            row.innerHTML = `
                ${!isAdmin ? '<div class="msg-avatar">U</div>' : ''}
                <div>
                    <div class="msg-bubble">${escHtml(content)}</div>
                    <div class="msg-time">${sentAt}</div>
                </div>
                ${isAdmin ? '<div class="msg-avatar">나</div>' : ''}
            `;
            container.appendChild(row);
            scrollToBottom();
        }

        function escHtml(str) {
            return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            input.value = '';

            fetch('/api/admin/chat/send', {
                method: 'POST',
                headers: getCsrfHeaders(),
                body: JSON.stringify({ memberId, content })
            })
            .then(res => res.json())
            .then(data => appendMessage(data.content, 'ADMIN', data.sentAt))
            .catch(() => alert('전송 실패'))
            .finally(() => { btn.disabled = false; });
        }

        // 5초 폴링 - 새 메시지 확인
        setInterval(() => {
            fetch(`/api/admin/chat/messages/${memberId}`)
            .then(res => res.json())
            .then(messages => {
                const container = document.getElementById('chatMessages');
                const rendered = container.querySelectorAll('.msg-row').length;
                if (messages.length > rendered) {
                    const newMsgs = messages.slice(rendered);
                    newMsgs.forEach(m => {
                        if (m.senderType === 'USER') {
                            appendMessage(m.content, 'USER', m.sentAt);
                        }
                    });
                }
            });
        }, 5000);
    </script>
</body>
</html>
