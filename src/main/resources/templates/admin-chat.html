<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>1:1 채팅 관리 - KPBridge Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; color: #333; }
        .navbar { background: #1a1a2e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; color: #007bff; text-decoration: none; }
        .nav-links a { color: #ccc; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .nav-links a:hover { color: white; }

        .container { max-width: 800px; margin: 36px auto; padding: 0 20px; }

        /* 상단 긴급 배너 */
        .urgent-banner {
            background: linear-gradient(135deg, #dc3545, #c0392b);
            color: white; border-radius: 14px; padding: 20px 28px;
            margin-bottom: 24px; display: flex; align-items: center; gap: 16px;
            box-shadow: 0 6px 20px rgba(220,53,69,0.35);
            animation: pulse-shadow 2s infinite;
        }
        @keyframes pulse-shadow {
            0%, 100% { box-shadow: 0 6px 20px rgba(220,53,69,0.35); }
            50%       { box-shadow: 0 6px 28px rgba(220,53,69,0.6); }
        }
        .urgent-icon { font-size: 36px; flex-shrink: 0; }
        .urgent-text h2 { margin: 0 0 4px; font-size: 18px; }
        .urgent-text p  { margin: 0; font-size: 13px; opacity: 0.9; }

        /* 헤더 */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .page-header h1 { font-size: 24px; margin: 0; }
        .back-btn { color: #666; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: #007bff; }

        /* 섹션 구분 */
        .section-label {
            font-size: 12px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: #aaa; margin: 20px 0 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: #e9ecef; }

        /* 회원 카드 목록 */
        .chat-list { display: flex; flex-direction: column; gap: 8px; }

        .chat-item {
            background: white; border-radius: 12px; padding: 16px 20px;
            display: flex; align-items: center; gap: 14px;
            text-decoration: none; color: inherit;
            border: 2px solid transparent;
            transition: all 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .chat-item:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }

        /* 미확인 있을 때 카드 스타일 */
        .chat-item.has-unread {
            border-color: #dc3545;
            background: linear-gradient(to right, #fff5f5, white);
        }
        .chat-item.has-unread:hover { border-color: #c0392b; }

        .avatar {
            width: 46px; height: 46px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; flex-shrink: 0;
            background: linear-gradient(135deg, #007bff, #00d2ff); color: white;
        }
        .chat-item.has-unread .avatar { background: linear-gradient(135deg, #dc3545, #ff6b6b); }

        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 700; font-size: 15px; }
        .chat-item.has-unread .chat-name { color: #dc3545; }
        .chat-preview {
            font-size: 13px; color: #888; margin-top: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: min(400px, 50vw);
        }
        .chat-item.has-unread .chat-preview { color: #555; font-weight: 500; }

        .chat-meta { text-align: right; flex-shrink: 0; }
        .chat-time { font-size: 11px; color: #aaa; margin-bottom: 6px; }

        /* 미확인 배지 */
        .unread-badge {
            background: #dc3545; color: white;
            font-size: 13px; font-weight: 800;
            padding: 3px 10px; border-radius: 20px;
            min-width: 28px; text-align: center;
            display: inline-block;
            animation: badge-bounce 1.5s infinite;
        }
        @keyframes badge-bounce {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.15); }
        }
        .read-icon { color: #bbb; font-size: 18px; }

        /* 빈 상태 */
        .empty { text-align: center; padding: 60px; color: #aaa; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/admin" class="logo">KPBridge Admin</a>
        <div class="nav-links">
            <a href="/admin">대시보드</a>
            <a href="/admin/chat">채팅 관리</a>
            <a href="/logout">로그아웃</a>
        </div>
    </nav>

    <div class="container">

        <!-- 미확인 메시지 긴급 배너 -->
        <div class="urgent-banner" th:if="${totalUnread > 0}">
            <div class="urgent-icon">🚨</div>
            <div class="urgent-text">
                <h2>미확인 메시지 <span th:text="${totalUnread}"></span>건</h2>
                <p>아래 강조된 대화를 먼저 확인해주세요. 빠른 응대가 고객 만족으로 이어집니다!</p>
            </div>
        </div>

        <div class="page-header">
            <h1>💬 1:1 채팅 관리</h1>
            <a href="/admin" class="back-btn">← 대시보드</a>
        </div>

        <div class="chat-list" th:if="${!#lists.isEmpty(chatList)}">

            <!-- 미확인 섹션 -->
            <th:block th:with="unreadItems=${chatList.?[unreadCount > 0]}">
                <div class="section-label" th:if="${!#lists.isEmpty(unreadItems)}">
                    🔴 미확인 메시지 (<span th:text="${#lists.size(unreadItems)}"></span>명)
                </div>
                <a th:each="item : ${unreadItems}"
                   th:href="@{/admin/chat/{id}(id=${item.member.id})}"
                   class="chat-item has-unread">
                    <div class="avatar" th:text="${#strings.substring(item.member.userName, 0, 1)}">K</div>
                    <div class="chat-info">
                        <div class="chat-name" th:text="${item.member.userName} + '  (@' + ${item.member.userId} + ')'"></div>
                        <div class="chat-preview"
                             th:text="${item.lastMessage != null} ? ${item.lastMessage.content} : '메시지 없음'"></div>
                    </div>
                    <div class="chat-meta">
                        <div class="chat-time"
                             th:text="${item.lastMessage != null} ? ${#temporals.format(item.lastMessage.sentAt, 'MM/dd HH:mm')} : ''"></div>
                        <span class="unread-badge" th:text="${item.unreadCount} + '개'"></span>
                    </div>
                </a>
            </th:block>

            <!-- 확인 완료 섹션 -->
            <th:block th:with="readItems=${chatList.?[unreadCount == 0]}">
                <div class="section-label" th:if="${!#lists.isEmpty(readItems)}">
                    ✅ 확인 완료
                </div>
                <a th:each="item : ${readItems}"
                   th:href="@{/admin/chat/{id}(id=${item.member.id})}"
                   class="chat-item">
                    <div class="avatar" th:text="${#strings.substring(item.member.userName, 0, 1)}">K</div>
                    <div class="chat-info">
                        <div class="chat-name" th:text="${item.member.userName} + '  (@' + ${item.member.userId} + ')'"></div>
                        <div class="chat-preview"
                             th:text="${item.lastMessage != null} ? ${item.lastMessage.content} : '메시지 없음'"></div>
                    </div>
                    <div class="chat-meta">
                        <div class="chat-time"
                             th:text="${item.lastMessage != null} ? ${#temporals.format(item.lastMessage.sentAt, 'MM/dd HH:mm')} : ''"></div>
                        <span class="read-icon">›</span>
                    </div>
                </a>
            </th:block>

        </div>

        <div class="empty" th:if="${#lists.isEmpty(chatList)}">
            <p style="font-size: 44px; margin-bottom: 12px;">💬</p>
            <p>아직 채팅을 시작한 사용자가 없습니다.</p>
        </div>

    </div>
</body>
</html>
