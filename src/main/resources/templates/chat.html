<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>1:1 문의 - KPBridge</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

        /* 네비게이션 */
        .navbar { background: #fff; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); flex-shrink: 0; }
        .logo { font-size: 20px; font-weight: 800; color: #007bff; text-decoration: none; }
        .nav-right a { text-decoration: none; color: #666; font-size: 14px; margin-left: 16px; }
        .nav-right a:hover { color: #007bff; }

        /* 채팅 레이아웃 */
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 700px; width: 100%; margin: 20px auto; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }

        /* 채팅 헤더 */
        .chat-header { background: linear-gradient(135deg, #007bff, #00d2ff); color: white; padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
        .chat-header-icon { width: 42px; height: 42px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .chat-header-info h3 { font-size: 16px; margin: 0; }
        .chat-header-info p { font-size: 12px; opacity: 0.8; margin: 2px 0 0; }

        /* 메시지 영역 */
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; min-height: 400px; max-height: 55vh; }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e9ecef; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .msg-row.admin .msg-avatar { background: #007bff; color: white; }

        .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .msg-row.user .msg-bubble { background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .msg-row.admin .msg-bubble { background: #f1f3f5; color: #333; border-bottom-left-radius: 4px; }
        .msg-row.system .msg-bubble { background: #fff3cd; color: #856404; border-radius: 10px; font-size: 13px; text-align: center; }
        .msg-row.system { justify-content: center; }

        .msg-time { font-size: 11px; color: #aaa; white-space: nowrap; margin-bottom: 2px; }

        .empty-chat { text-align: center; color: #aaa; padding: 60px 20px; }
        .empty-chat .icon { font-size: 48px; margin-bottom: 12px; }

        /* 입력창 */
        .chat-input-area { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        .chat-input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; transition: border 0.2s; }
        .chat-input:focus { border-color: #007bff; }
        .send-btn { background: #007bff; color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: background 0.2s; flex-shrink: 0; }
        .send-btn:hover { background: #0056b3; }
        .send-btn:disabled { background: #aaa; cursor: not-allowed; }

        /* 알림 배너 */
        .notice-banner { background: #e8f4ff; border-left: 4px solid #007bff; padding: 12px 18px; font-size: 13px; color: #555; margin: 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">KPBridge</a>
        <div class="nav-right">
            <a href="/mypage">마이페이지</a>
            <a href="/">메인</a>
            <a href="/logout">로그아웃</a>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-icon">🛎️</div>
            <div class="chat-header-info">
                <h3>KPBridge 고객 지원</h3>
                <p th:text="'안녕하세요, ' + ${member.userName} + '님. 무엇이든 물어보세요!'">안녕하세요!</p>
            </div>
        </div>

        <div class="notice-banner">
            📌 거래 문의, 입출금, 기타 서비스 관련 내용을 남겨주시면 담당자가 빠르게 확인합니다.
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-chat" th:if="${#lists.isEmpty(messages)}">
                <div class="icon">💬</div>
                <p>아직 대화 내역이 없습니다.<br>궁금한 점을 자유롭게 남겨주세요!</p>
            </div>
            <th:block th:each="msg : ${messages}">
                <div th:class="'msg-row ' + (${msg.senderType == 'USER'} ? 'user' : 'admin')">
                    <div class="msg-avatar" th:if="${msg.senderType == 'ADMIN'}">🛎️</div>
                    <div>
                        <div class="msg-bubble" th:text="${msg.content}"></div>
                        <div class="msg-time" th:style="${msg.senderType == 'USER'} ? 'text-align:right' : ''"
                             th:text="${#temporals.format(msg.sentAt, 'MM-dd HH:mm')}"></div>
                    </div>
                    <div class="msg-avatar" th:if="${msg.senderType == 'USER'}" style="background:#007bff;color:white;">나</div>
                </div>
            </th:block>
        </div>

        <div class="chat-input-area">
            <input type="text" id="msgInput" class="chat-input" placeholder="메시지를 입력하세요..." maxlength="500"
                   onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMsg(); }">
            <button class="send-btn" onclick="sendMsg()" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        // 채팅창 스크롤 하단 고정
        function scrollToBottom() {
            const el = document.getElementById('chatMessages');
            el.scrollTop = el.scrollHeight;
        }
        scrollToBottom();

        function getCsrfHeaders() {
            const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
            const headers = { 'Content-Type': 'application/json' };
            if (token && header) headers[header] = token;
            return headers;
        }

        function appendMessage(content, senderType, sentAt) {
            const container = document.getElementById('chatMessages');
            // 빈 채팅 안내 제거
            const empty = container.querySelector('.empty-chat');
            if (empty) empty.remove();

            const isUser = senderType === 'USER';
            const row = document.createElement('div');
            row.className = 'msg-row ' + (isUser ? 'user' : 'admin');
            row.innerHTML = `
                ${!isUser ? '<div class="msg-avatar" style="background:#007bff;color:white;">🛎️</div>' : ''}
                <div>
                    <div class="msg-bubble">${escHtml(content)}</div>
                    <div class="msg-time" style="${isUser ? 'text-align:right' : ''}">${sentAt}</div>
                </div>
                ${isUser ? '<div class="msg-avatar" style="background:#007bff;color:white;">나</div>' : ''}
            `;
            container.appendChild(row);
            scrollToBottom();
        }

        function escHtml(str) {
            return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            input.value = '';

            fetch('/api/chat/send', {
                method: 'POST',
                headers: getCsrfHeaders(),
                body: JSON.stringify({ content })
            })
            .then(res => res.json())
            .then(data => {
                appendMessage(data.content, 'USER', data.sentAt);
            })
            .catch(() => alert('전송 실패. 다시 시도해주세요.'))
            .finally(() => { btn.disabled = false; });
        }

        // 5초마다 새 메시지 폴링
        let lastId = 0;
        function initLastId() {
            const rows = document.querySelectorAll('.msg-row');
            // 서버에서 렌더링된 마지막 메시지 id를 JS에서 추적하기 위해 폴링으로만 처리
        }

        setInterval(() => {
            fetch('/api/chat/messages')
            .then(res => res.json())
            .then(messages => {
                const container = document.getElementById('chatMessages');
                const rendered = container.querySelectorAll('.msg-row').length;
                if (messages.length > rendered) {
                    // 새 메시지만 추가
                    const newMsgs = messages.slice(rendered);
                    newMsgs.forEach(m => {
                        if (m.senderType === 'ADMIN') {
                            appendMessage(m.content, 'ADMIN', m.sentAt);
                        }
                    });
                }
            });
        }, 5000);
    </script>
</body>
</html>
