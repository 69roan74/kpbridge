<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>KPBridge - FAQ</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 16px 60px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: clamp(20px, 5vw, 28px); }
        .faq-list { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .faq-item { border-bottom: 1px solid #eee; }
        .faq-item:last-child { border-bottom: none; }
        .faq-question { padding: 18px 20px; cursor: pointer; font-size: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; gap: 10px; min-height: 56px; }
        .faq-question:hover { background: #f8f9fa; }
        .faq-question span:first-child { flex: 1; line-height: 1.4; }
        .faq-arrow { flex-shrink: 0; color: #007bff; font-size: 14px; transition: transform 0.2s; }
        .faq-question.open .faq-arrow { transform: rotate(180deg); }
        .faq-answer { display: none; padding: 0 20px 20px; color: #555; background: #fcfcfc; line-height: 1.7; font-size: 14px; }
        .btn-home { display: block; width: 100%; max-width: 240px; margin: 32px auto 0; text-align: center; background: #007bff; color: white; padding: 14px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>자주 묻는 질문 (FAQ)</h1>

        <div class="faq-list">
            <div class="faq-item" th:each="faq : ${faqs}">
                <div class="faq-question" onclick="toggleFaq(this)">
                    <span th:text="${faq.question}">질문 내용</span>
                    <span class="faq-arrow">▼</span>
                </div>
                <div class="faq-answer">
                    <p th:text="${faq.answer}" style="margin: 0;"></p>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(faqs)}" style="padding:40px; text-align:center; color:#999;">
                등록된 질문이 없습니다.
            </div>
        </div>

        <a th:href="@{/}" class="btn-home">← 메인으로 돌아가기</a>
    </div>

    <script>
        function toggleFaq(el) {
            const answer = el.nextElementSibling;
            const isHidden = answer.style.display !== 'block';
            answer.style.display = isHidden ? 'block' : 'none';
            el.classList.toggle('open', isHidden);
        }
    </script>
</body>
</html>
