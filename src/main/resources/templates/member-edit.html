<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>정보 수정</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>내 정보 수정</h2>
        <form th:action="@{/member/update}" method="post">
            <div class="input-group">
                <label>이름</label>
                <input type="text" name="userName" th:value="${member.userName}" required>
            </div>
            <div class="input-group">
                <label>전화번호</label>
                <input type="text" name="phone" th:value="${member.phone}" required>
            </div>
            <div class="input-group">
                <label>이메일</label>
                <input type="email" name="email" th:value="${member.email}" required>
            </div>
            <button type="submit" class="btn-save">수정 완료</button>
            <a th:href="@{/mypage}" style="display:block; text-align:center; margin-top:15px; color:#666;">취소</a>
        </form>
        <form th:action="@{/member/delete}" method="post" onsubmit="return confirm('정말 탈퇴하시겠습니까?');">
            <button type="submit" style="color: red; background: none; border: none; text-decoration: underline; cursor: pointer;">
                회원 탈퇴
            </button>
        </form>
    </div>
</body>
</html>
