<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'KPBridge - ' + #{register.title}">KPBridge - 회원가입</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .register-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .logo { font-size: 32px; font-weight: bold; color: #007bff; text-align: center; margin-bottom: 10px; letter-spacing: 1px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        .btn-register { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; transition: background 0.3s; }
        .btn-register:hover { background-color: #0056b3; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .login-link a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-container">
        <div style="text-align:right; margin-bottom: 10px;">
            <a th:href="@{/register(lang=ko)}" style="font-size:12px; padding:3px 9px; border:1px solid #ddd; border-radius:20px; text-decoration:none; color:#555; margin-right:5px;">KO</a>
            <a th:href="@{/register(lang=en)}" style="font-size:12px; padding:3px 9px; border:1px solid #ddd; border-radius:20px; text-decoration:none; color:#555;">EN</a>
        </div>
        <div class="logo">KPBridge</div>
        <div class="subtitle" th:text="#{register.subtitle}">안전한 차익거래의 시작</div>

        <div th:if="${errorMessage}" style="color: #f82b60; font-weight: bold; text-align: center; margin-top: 10px; margin-bottom: 20px;">
            <span th:text="${errorMessage}"></span>
        </div>

        <form action="/register" method="post" autocomplete="off">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label th:text="#{register.id}">아이디</label>
                <input type="text" name="userId" th:placeholder="#{register.id.placeholder}" required>
            </div>
            <div class="form-group">
                <label th:text="#{register.password}">비밀번호</label>
                <input type="password" name="password" th:placeholder="#{register.password.placeholder}" required>
            </div>
            <div class="form-group">
                <label th:text="#{register.name}">성함</label>
                <input type="text" name="userName" th:placeholder="#{register.name.placeholder}" required>
            </div>
            <div class="form-group">
                <label th:text="#{register.phone}">전화번호</label>
                <input type="text" name="phone" th:placeholder="#{register.phone.placeholder}">
            </div>
            <div class="form-group">
                <label th:text="#{register.email}">이메일</label>
                <input type="email" name="email" th:placeholder="#{register.email.placeholder}">
            </div>
            <div class="form-group">
                <label th:text="#{register.birth}">생년월일</label>
                <input type="date" name="birthDate" id="birthDate">
            </div>
            <div class="form-group">
                <label th:text="#{register.referral}">추천인 코드 (선택)</label>
                <input type="text" name="referralCode" th:placeholder="#{register.referral.placeholder}">
            </div>
            <button type="submit" class="btn-register" th:text="#{register.button}">가입하고 코인 받기</button>
        </form>

        <div class="login-link">
            <span th:text="#{register.login.prompt}">이미 계정이 있으신가요?</span> <a href="/login" th:text="#{register.login.link}">로그인 하기</a>
        </div>
    </div>
</body>
</html>
