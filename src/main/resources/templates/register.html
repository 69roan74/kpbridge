<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KPBridge - 회원가입</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .register-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .logo { font-size: 32px; font-weight: bold; color: #007bff; text-align: center; margin-bottom: 10px; letter-spacing: 1px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        .btn-register { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; transition: background 0.3s; }
        .btn-register:hover { background-color: #0056b3; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .login-link a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">KPBridge</div>
        <div class="subtitle">안전한 차익거래의 시작</div>

        <div th:if="${errorMessage}" style="color: #f82b60; font-weight: bold; text-align: center; margin-top: 10px; margin-bottom: 20px;">
            <span th:text="${errorMessage}"></span>
        </div>
        
        <form action="/register" method="post" autocomplete="off">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="userId" placeholder="사용할 아이디를 입력하세요" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <div class="form-group">
                <label>성함</label>
                <input type="text" name="userName" placeholder="실명을 입력하세요" required>
            </div>
            <div class="form-group">
                <label>전화번호</label>
                <input type="text" name="phone" placeholder="010-0000-0000">
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="email" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>생년월일</label>
                <input type="date" name="birthDate" id="birthDate">
            </div>
            <div class="form-group">
                <label>추천인 코드 (선택)</label>
                <input type="text" name="referralCode" placeholder="코드를 입력하면 추가 보너스!">
            </div>
            <button type="submit" class="btn-register">가입하고 코인 받기</button>
        </form>
        
        <div class="login-link">
            이미 계정이 있으신가요? <a href="/login">로그인 하기</a>
        </div>
    </div>
</body>
</html>
