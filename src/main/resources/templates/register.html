<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title th:text="'KPBridge - ' + #{register.title}">KPBridge - 회원가입</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 24px 16px 40px; }
        .register-container { background: white; padding: 32px 28px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 460px; }
        .lang-toggle { text-align: right; margin-bottom: 10px; }
        .lang-toggle a { font-size: 12px; padding: 4px 10px; border: 1px solid #ddd; border-radius: 20px; text-decoration: none; color: #555; margin-left: 5px; }
        .logo { font-size: 28px; font-weight: bold; color: #007bff; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 8px; font-size: 14px; }
        .bonus-banner { background: linear-gradient(135deg, #e8f5e9, #f0fff4); border: 1px solid #a5d6a7; border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; text-align: center; font-size: 13px; color: #2e7d32; font-weight: 600; }
        .error-msg { color: #f82b60; font-weight: bold; text-align: center; margin-bottom: 16px; font-size: 14px; background: #fff0f3; padding: 10px; border-radius: 8px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 13px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 16px; /* 16px prevents iOS zoom */ transition: border-color 0.2s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        .hint { font-size: 11px; color: #999; margin-top: 4px; }
        .btn-register { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 18px; transition: background 0.2s; }
        .btn-register:hover { background: #0056b3; }
        .login-link { text-align: center; margin-top: 18px; font-size: 14px; color: #666; }
        .login-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        .section-divider { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 12px; border-bottom: 1px solid #eee; padding-bottom: 6px; }

        @media (max-width: 400px) {
            body { padding: 16px 12px 40px; }
            .register-container { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="lang-toggle">
            <a th:href="@{/register(lang=ko)}">KO</a>
            <a th:href="@{/register(lang=en)}">EN</a>
        </div>
        <div class="logo">KPBridge</div>
        <div class="subtitle" th:text="#{register.subtitle}">안전한 차익거래의 시작</div>
        <div class="bonus-banner">🎁 가입 즉시 <strong>150 KP</strong> 무료 지급!</div>

        <div th:if="${errorMessage}" class="error-msg">
            <span th:text="${errorMessage}"></span>
        </div>

        <form action="/register" method="post" autocomplete="off">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="section-divider">계정 정보</div>
            <div class="form-group">
                <label th:text="#{register.id}">아이디</label>
                <input type="text" name="userId" th:placeholder="#{register.id.placeholder}" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label th:text="#{register.password}">비밀번호</label>
                <input type="password" name="password" th:placeholder="#{register.password.placeholder}" autocomplete="new-password" required>
                <div class="hint">영문, 숫자 포함 8자 이상 권장</div>
            </div>

            <div class="section-divider">본인 정보</div>
            <div class="form-group">
                <label th:text="#{register.name}">성함</label>
                <input type="text" name="userName" th:placeholder="#{register.name.placeholder}" required>
            </div>
            <div class="form-group">
                <label th:text="#{register.phone}">전화번호</label>
                <input type="tel" name="phone" th:placeholder="#{register.phone.placeholder}" id="phoneInput">
                <div class="hint">예: 010-1234-5678</div>
            </div>
            <div class="form-group">
                <label th:text="#{register.email}">이메일</label>
                <input type="email" name="email" th:placeholder="#{register.email.placeholder}">
            </div>
            <div class="form-group">
                <label th:text="#{register.birth}">생년월일</label>
                <input type="date" name="birthDate" id="birthDate">
                <div class="hint">오늘 이전 날짜로 입력해주세요</div>
            </div>

            <div class="section-divider">추천인 (선택)</div>
            <div class="form-group">
                <label th:text="#{register.referral}">추천인 코드</label>
                <input type="text" name="referralCode" th:placeholder="#{register.referral.placeholder}" style="text-transform:uppercase;">
            </div>

            <button type="submit" class="btn-register" th:text="#{register.button}">가입하고 코인 받기</button>
        </form>

        <div class="login-link">
            <span th:text="#{register.login.prompt}">이미 계정이 있으신가요?</span>
            <a href="/login" th:text="#{register.login.link}">로그인 하기</a>
        </div>
    </div>
    <script>
        // 전화번호 자동 하이픈
        document.getElementById('phoneInput').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length <= 3) e.target.value = v;
            else if (v.length <= 7) e.target.value = v.slice(0,3) + '-' + v.slice(3);
            else e.target.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
        });
        // 생년월일 최대값 오늘로 제한
        document.getElementById('birthDate').max = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
